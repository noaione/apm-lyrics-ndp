name: Build

on:
  push:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build release package
        run: make build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: apm-lyrics-ndp
          path: apm-lyrics-ndp.ndp

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: apm-lyrics-ndp

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: apm-lyrics-ndp.ndp

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: apm-lyrics-ndp.ndp
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-') }}
          body: |
            **Full changelog**: ${{ github.server_url }}/${{ github.repository }}/commits/${{ github.ref_name }}

            **Build provenance attestation:** ${{ steps.attest.outputs.attestation-url }}
